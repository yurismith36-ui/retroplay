<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>RetroPlay — Jogando</title>
  <link rel="icon" href="assets/icone-controle.svg">
  <link rel="stylesheet" href="css/style.css?v=cloud-2-3">
</head>
<body class="player-page">
  <header class="player-topbar">
    <a href="index.html" class="player-back">← VOLTAR</a>
    <div class="player-game-title">
      <strong id="player-title">Carregando...</strong>
      <span id="player-console"></span>
    </div>
    <div class="player-actions">
      <div id="cloud-save-status" class="cloud-save-status offline">☁️ Verificando conta...</div>
      <button id="clear-player-memory" class="clear-player-memory" type="button">LIMPAR MEMÓRIA</button>
      <button id="fullscreen-button" type="button" aria-pressed="false">TELA CHEIA</button>
    </div>
  </header>

  <main>
    <section class="emulator-stage" id="emulator-stage">
      <div id="player-status" class="player-status">
        <div class="loading-pixel"></div>
        <p>Preparando o emulador...</p>
      </div>
      <div id="game"></div>
    </section>

    <section class="player-info">
      <img id="player-cover" alt="" class="player-cover">
      <div>
        <span id="player-genre" class="genre-badge"></span>
        <h1 id="player-info-title"></h1>
        <p id="player-description"></p>
        <div class="info-list">
          <div><small>ANO</small><strong id="player-year">—</strong></div>
          <div><small>DESENVOLVEDORA</small><strong id="player-developer">—</strong></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js?v=cloud-2-3"></script>
  <script src="js/auth.js?v=cloud-2-3"></script>
  <script src="js/cloud.js?v=cloud-2-3"></script>
  <script src="js/cloud-save-state.js?v=cloud-2-3"></script>
  <script src="js/player.js?v=cloud-2-3"></script>
</body>
</html>

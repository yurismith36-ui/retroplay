<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroPlay — Jogar</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#080c12;color:#fff;font-family:Arial,sans-serif}
    header{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;background:#0d131c;border-bottom:1px solid #223043}
    a{color:#59a8ff;text-decoration:none}
    main{max-width:1200px;margin:auto;padding:22px}
    .info{margin-bottom:16px}
    .info h1{margin:0 0 6px}
    .info p{color:#aebed1;margin:0}
    #game{width:100%;min-height:68vh;background:#000;border-radius:12px;overflow:hidden}
    .erro{padding:28px;border:1px solid #47313a;background:#21151a;border-radius:10px;color:#ffb7c0}
  </style>
</head>
<body>
  <header>
    <strong>RetroPlay V6</strong>
    <a href="index.html">← Voltar para a biblioteca</a>
  </header>

  <main>
    <section class="info">
      <h1 id="gameTitle">Carregando jogo...</h1>
      <p id="gameInfo"></p>
    </section>

    <div id="game"></div>
    <div id="errorBox" class="erro" hidden></div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const gameId = params.get("id");
    const title = document.getElementById("gameTitle");
    const info = document.getElementById("gameInfo");
    const errorBox = document.getElementById("errorBox");
    const gameArea = document.getElementById("game");

    function showError(message) {
      gameArea.hidden = true;
      errorBox.hidden = false;
      errorBox.textContent = message;
      title.textContent = "Não foi possível abrir o jogo";
    }

    if (!gameId) {
      showError("O endereço não contém o identificador do jogo.");
    } else {
      fetch("dados/games.json", { cache: "no-store" })
        .then(response => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then(games => {
          const game = games.find(item => item.id === gameId);
          if (!game) throw new Error("Jogo não encontrado no catálogo.");

          title.textContent = game.nome;
          info.textContent = `${game.console || ""} ${game.ano ? "• " + game.ano : ""}`;

          window.EJS_player = "#game";
          window.EJS_core = game.core || "snes";
          window.EJS_gameName = game.nome;
          window.EJS_color = "#2388ff";
          window.EJS_startOnLoaded = false;
          window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
          window.EJS_gameUrl = game.rom;

          const loader = document.createElement("script");
          loader.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
          loader.onerror = () => showError("Não foi possível carregar o EmulatorJS.");
          document.body.appendChild(loader);
        })
        .catch(error => {
          console.error(error);
          showError(`Erro: ${error.message}`);
        });
    }
  </script>
</body>
</html>

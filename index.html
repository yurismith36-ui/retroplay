<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#090d14">
  <title>RetroPlay V7</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html"><span>R</span> RetroPlay <small>V7</small></a>
    <input id="searchInput" class="search" type="search" placeholder="Pesquisar jogo..." autocomplete="off">
  </header>

  <main>
    <section id="hero" class="hero">
      <div class="hero-content">
        <div id="heroConsole" class="eyebrow">SNES</div>
        <div id="heroTitle" class="hero-title">RetroPlay V7</div>
        <p id="heroDescription">Sua biblioteca de jogos retrô.</p>
        <div id="heroMeta" class="hero-meta"></div>
        <div class="hero-actions">
          <button id="heroPlay" class="primary">▶ Jogar agora</button>
          <button id="heroFavorite" class="secondary">♡ Favoritar</button>
        </div>
      </div>
    </section>

    <section class="library">
      <div class="library-head">
        <div>
          <span class="eyebrow">BIBLIOTECA</span>
          <h1>Jogos SNES</h1>
        </div>
        <span id="resultCount"></span>
      </div>

      <div id="consoleList" class="filters"></div>
      <div id="gamesGrid" class="grid"></div>
      <div id="emptyState" class="empty" hidden>Nenhum jogo encontrado.</div>
    </section>

    <section class="library">
      <div class="library-head">
        <div>
          <span class="eyebrow">SUA LISTA</span>
          <h2>Favoritos</h2>
        </div>
      </div>
      <div id="favoritesGrid" class="grid"></div>
      <div id="favoritesEmpty" class="empty">Você ainda não adicionou favoritos.</div>
    </section>
  </main>

  <footer>RetroPlay V7 • Catálogo pessoal para jogos autorizados</footer>
  <script src="js/app.js"></script>
</body>
</html>
